services:
  - type: worker
    name: deal-hunter-bot
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: CHANNEL_ID
        value: "@The_Deal_Hunter_Official"
      - key: EARNKARO_ID
        sync: false
      - key: ADMIN_IDS
        sync: false
      - key: AUTO_POST_INTERVAL
        value: "60"
