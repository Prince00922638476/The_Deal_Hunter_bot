name: 🤖 Deal Hunter Bot v3.0 — 24/7

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore and Convert Session
        env:
          SESSION_STRING: ${{ secrets.SESSION_STRING }}
        run: |
          python3 -c "
          import os
          try:
              from telethon.sessions import StringSession, SQLiteSession
              ss = os.environ.get('SESSION_STRING', '')
              if ss:
                  print('String Session mil gayi hai, Database mein convert kar rahe hain...')
                  string_session = StringSession(ss)
                  sqlite_session = SQLiteSession('deal_hunter_session')
                  sqlite_session.set_dc(string_session.dc_id, string_session.server_address, string_session.port)
                  sqlite_session.auth_key = string_session.auth_key
                  sqlite_session.save()
                  print('✅ Session successfully converted to SQLite Database!')
              else:
                  print('⚠️ SESSION_STRING secret nahi mila!')
          except Exception as e:
              print('❌ Session conversion failed:', e)
          "

      - name: 🚀 Run Bot
        env:
          TG_API_ID:       ${{ secrets.TG_API_ID }}
          TG_API_HASH:     ${{ secrets.TG_API_HASH }}
          TG_PHONE:        ${{ secrets.TG_PHONE }}
          BOT_TOKEN:       ${{ secrets.BOT_TOKEN }}
          MY_CHANNEL:      ${{ secrets.MY_CHANNEL }}
          ADMIN_ID:        ${{ secrets.ADMIN_ID }}
          AMAZON_TAG:      ${{ secrets.AMAZON_TAG }}
          EARNKARO_TOKEN:  ${{ secrets.EARNKARO_TOKEN }}
          CUELINKS_PID:    ${{ secrets.CUELINKS_PID }}
          CUELINKS_KEY:    ${{ secrets.CUELINKS_KEY }}
          FLIPKART_AFFID:  ${{ secrets.FLIPKART_AFFID }}
        run: timeout 20000 python3 bot.py || true
        
